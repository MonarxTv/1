<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kino</title>

<link rel="stylesheet" href="2style.css">

<style>
body{
  margin:0;
  background:#020617;
  color:#fff;
  font-family:sans-serif;
}

/* HEADER */
.header{
  padding:18px;
  font-size:20px;
  font-weight:600;
  background:linear-gradient(90deg,#020617,#0f172a);
  border-bottom:1px solid #1e293b;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* PLAYER */
#playerContainer{
  width:100%;
  background:#000;
  border-radius:12px;
  overflow:hidden;
  margin-bottom:15px;
   height: 56.25vw; /* 16:9 nisbat, gorizontal ekranda to‘g‘ri chiqadi */
}

/* EPISODES */
#episodes{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:15px;
}

#episodes button{
  padding:7px 12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:#fff;
  cursor:pointer;
}

#episodes .active{
  background:#ef4444;
}

/* INFO */
#genre{
  color:#94a3b8;
  margin:5px 0;
}

#desc{
  font-size:14px;
  color:#cbd5f5;
  line-height:1.5;
}

/* ACTORS */
.actor-row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  margin:15px 0;
}

.actor-item{
  text-align:center;
  cursor:pointer;
  min-width:75px;
}

.actor-item img{
  width:75px;
  height:75px;
  border-radius:50%;
  object-fit:cover;
}

/* IMAGES GRID (2:1) */
.images{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.images img{
  width:100%;
  aspect-ratio:2/1;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
}

/* PREMIUM */
#premiumBox{
  display:none;
  background:#7f1d1d;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

#premiumBox a{
  display:inline-block;
  margin-top:10px;
  padding:10px 15px;
  background:#ef4444;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
}

/* MODAL */
#imageModal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#imageModal img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>

<div class="header" id="movieTitle">Kino</div>

<div class="container">

<div id="playerContainer"></div>

<div id="premiumBox">
  <h3>Premium kontent</h3>
  <p>Bu film faqat premium foydalanuvchilar uchun</p>
  <a href="https://t.me/MonarxTvbot" target="_blank">Obuna olish</a>
</div>

<div id="episodes"></div>

<h3 id="genre"></h3>
<p id="desc"></p>

<h3>👤 Aktyorlar</h3>
<div id="actors" class="actor-row"></div>

<h3>🖼 Rasmlar</h3>
<div id="images" class="images"></div>

</div>

<script src="3data.js"></script>

<script>
const TMDB_API_KEY="c86f82502e750953b61a3fc9895c95a2";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");
const movie=moviesData[id];

const playerContainer=document.getElementById("playerContainer");
const episodesDiv=document.getElementById("episodes");
const title=document.getElementById("movieTitle");
const genre=document.getElementById("genre");
const desc=document.getElementById("desc");
const actorsDiv=document.getElementById("actors");
const imagesDiv=document.getElementById("images");
const premiumBox=document.getElementById("premiumBox");

/* VIDEO */
function loadVideo(url){
  playerContainer.innerHTML="";

  if(url==="premium"){
    premiumBox.style.display="block";
    return;
  }

  premiumBox.style.display="none";

  if(url.endsWith(".mp4")){
    const video=document.createElement("video");
    video.src=url;
    video.controls=true;
    video.autoplay=true;
    video.style.width="100%";
    video.style.height="100%";
    playerContainer.appendChild(video);
  }else{
    const iframe=document.createElement("iframe");
    iframe.src=url;
    iframe.allow="autoplay; fullscreen";
    iframe.style.width="100%";
    iframe.style.height="100%";
    playerContainer.appendChild(iframe);
  }
}

/* EPISODES (faqat serial) */
function renderEpisodes(){
  episodesDiv.innerHTML="";

  if(!movie.video || movie.video.length<=1){
    episodesDiv.style.display="none";
    return;
  }

  episodesDiv.style.display="flex";

  movie.video.forEach((v,i)=>{
    const btn=document.createElement("button");
    btn.textContent=`${i+1}-qism`;

    if(i===0) btn.classList.add("active");

    btn.onclick=()=>{
      document.querySelectorAll("#episodes button")
        .forEach(b=>b.classList.remove("active"));

      btn.classList.add("active");
      loadVideo(v);
    };

    episodesDiv.appendChild(btn);
  });
}

/* ACTORS */
async function renderActors(){
  actorsDiv.innerHTML="";

  for(const a of movie.actors){
    let name=a.name||"";
    let img=a.img||"";

    if(a.tmdbId){
      try{
        const res=await fetch(`https://api.themoviedb.org/3/person/${a.tmdbId}?api_key=${TMDB_API_KEY}`);
        const data=await res.json();
        name=data.name;
        img=data.profile_path
          ? "https://image.tmdb.org/t/p/w185"+data.profile_path
          : img;
      }catch(e){}
    }

    const div=document.createElement("div");
    div.className="actor-item";

    div.innerHTML=`
      <img src="${img}">
      <div>${name}</div>
    `;

    if(a.tmdbId){
      div.onclick=()=>{
        window.location.href=`actor.html?id=${a.tmdbId}`;
      };
    }

    actorsDiv.appendChild(div);
  }
}

/* IMAGES */
function renderImages(){
  imagesDiv.innerHTML="";

  movie.images.forEach(img=>{
    const i=document.createElement("img");
    i.src=img;

    i.onclick=()=>{
      modalImg.src=img;
      imageModal.style.display="flex";
    };

    imagesDiv.appendChild(i);
  });
}

/* MODAL */
const imageModal=document.createElement("div");
imageModal.id="imageModal";
imageModal.innerHTML=`<img id="modalImg">`;
document.body.appendChild(imageModal);

const modalImg=document.getElementById("modalImg");

imageModal.onclick=()=>{
  imageModal.style.display="none";
};

/* INIT */
function init(){
  if(!movie) return;

  title.textContent=movie.title;
  genre.textContent=movie.genre;
  desc.textContent=movie.desc;

  loadVideo(movie.video[0]);
  renderEpisodes();
  renderActors();
  renderImages();
}

init();
</script>

</body>
</html>
