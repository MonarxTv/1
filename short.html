<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts</title>

<link rel="stylesheet" href="2style.css">

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  overflow:hidden;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:600;
  border-bottom:1px solid #111;
}

/* WRAPPER */
.wrapper{
  height:calc(100vh - 60px);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:500px;
  overflow:hidden;
}

/* SLIDE */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 0.4s ease, opacity 0.4s ease;
}

/* VIDEO */
iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
}

/* TITLE */
.title{
  text-align:center;
  margin-top:10px;
  color:#94a3b8;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">Shorts</div>

<div class="wrapper">
  <div class="slider" id="slider"></div>
</div>

<div class="title" id="title"></div>

<script src="3data.js"></script>

<script>
// ==================== INIT ====================
const params = new URLSearchParams(window.location.search);
let index = parseInt(params.get("id")) || 0;

const slider = document.getElementById("slider");
const title = document.getElementById("title");

let startY = 0;
let isDragging = false;

// ==================== CREATE SLIDE ====================
function createSlide(item){
  const div = document.createElement("div");
  div.className = "slide";

  div.innerHTML = `
    <iframe src="${item.video}" allow="autoplay; fullscreen"></iframe>
  `;

  return div;
}

// ==================== RENDER ====================
function render(){
  slider.innerHTML = "";

  const current = shortsData[index];
  if(!current) return;

  const currentSlide = createSlide(current);
  currentSlide.style.transform = "translateY(0)";
  slider.appendChild(currentSlide);

  title.textContent = current.title || "";
}

// ==================== NEXT ====================
function next(){
  index++;
  if(index >= shortsData.length) index = 0;

  const newSlide = createSlide(shortsData[index]);
  newSlide.style.transform = "translateY(100%)";
  slider.appendChild(newSlide);

  requestAnimationFrame(()=>{
    newSlide.style.transform = "translateY(0)";
    slider.firstChild.style.transform = "translateY(-100%)";
  });

  setTimeout(render, 400);
}

// ==================== PREV ====================
function prev(){
  index--;
  if(index < 0) index = shortsData.length - 1;

  const newSlide = createSlide(shortsData[index]);
  newSlide.style.transform = "translateY(-100%)";
  slider.appendChild(newSlide);

  requestAnimationFrame(()=>{
    newSlide.style.transform = "translateY(0)";
    slider.firstChild.style.transform = "translateY(100%)";
  });

  setTimeout(render, 400);
}

// ==================== TOUCH ====================
document.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
  isDragging = true;
});

document.addEventListener("touchend", e=>{
  if(!isDragging) return;

  const endY = e.changedTouches[0].clientY;
  const diff = startY - endY;

  if(diff > 50) next();   // yuqoriga swipe
  if(diff < -50) prev();  // pastga swipe

  isDragging = false;
});

// ==================== KEYBOARD ====================
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowDown") next();
  if(e.key === "ArrowUp") prev();
});

// ==================== INIT ====================
render();
</script>

</body>
</html>
