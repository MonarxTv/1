<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts</title>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:sans-serif;
}

/* FULL SCREEN */
.wrapper{
  height:100vh;
  width:100%;
  position:relative;
  overflow:hidden;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:100%;
}

/* SLIDE */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  transition:transform 0.4s ease;
}

/* VIDEO */
iframe{
  width:100%;
  height:100%;
  border:none;
}

/* 🔥 SWIPE LAYER (ENG MUHIM) */
.swipe-layer{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:10;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="slider" id="slider"></div>

  <!-- 🔥 BUTUN EKRAN SWIPE -->
  <div class="swipe-layer" id="swipeLayer"></div>
</div>

<script src="3data.js"></script>

<script>
// ==================== INIT ====================
const params = new URLSearchParams(window.location.search);
let index = parseInt(params.get("id")) || 0;

const slider = document.getElementById("slider");
const swipeLayer = document.getElementById("swipeLayer");

let startY = 0;
let isDragging = false;

// ==================== CREATE SLIDE ====================
function createSlide(item){
  const div = document.createElement("div");
  div.className = "slide";

  let videoUrl = item.video;

  // 🔥 YouTube bo‘lsa loop qo‘shamiz
  if(videoUrl.includes("youtube.com")){
    const videoId = videoUrl.split("/embed/")[1].split("?")[0];

    videoUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=1&loop=1&playlist=${videoId}`;
  }

  div.innerHTML = `
    <iframe src="${videoUrl}" allow="autoplay; fullscreen"></iframe>
  `;

  return div;
}

// ==================== RENDER ====================
function render(){
  slider.innerHTML = "";

  const current = shortsData[index];
  if(!current) return;

  const currentSlide = createSlide(current);
  currentSlide.style.transform = "translateY(0)";
  slider.appendChild(currentSlide);
}

// ==================== NEXT ====================
function next(){
  index++;
  if(index >= shortsData.length) index = 0;

  const newSlide = createSlide(shortsData[index]);
  newSlide.style.transform = "translateY(100%)";
  slider.appendChild(newSlide);

  requestAnimationFrame(()=>{
    newSlide.style.transform = "translateY(0)";
    slider.firstChild.style.transform = "translateY(-100%)";
  });

  setTimeout(render, 400);
}

// ==================== PREV ====================
function prev(){
  index--;
  if(index < 0) index = shortsData.length - 1;

  const newSlide = createSlide(shortsData[index]);
  newSlide.style.transform = "translateY(-100%)";
  slider.appendChild(newSlide);

  requestAnimationFrame(()=>{
    newSlide.style.transform = "translateY(0)";
    slider.firstChild.style.transform = "translateY(100%)";
  });

  setTimeout(render, 400);
}

// ==================== 🔥 TOUCH (BUTUN EKRAN) ====================
swipeLayer.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
  isDragging = true;
});

swipeLayer.addEventListener("touchend", e=>{
  if(!isDragging) return;

  const endY = e.changedTouches[0].clientY;
  const diff = startY - endY;

  if(diff > 50) next();     // yuqoriga
  if(diff < -50) prev();    // pastga

  isDragging = false;
});

// ==================== DESKTOP (MOUSE DRAG) ====================
let mouseStart = 0;

swipeLayer.addEventListener("mousedown", e=>{
  mouseStart = e.clientY;
});

swipeLayer.addEventListener("mouseup", e=>{
  const diff = mouseStart - e.clientY;

  if(diff > 50) next();
  if(diff < -50) prev();
});

// ==================== KEYBOARD ====================
document.addEventListener("keydown", e=>{
  if(e.key === "ArrowDown") next();
  if(e.key === "ArrowUp") prev();
});

// ==================== INIT ====================
render();
</script>

</body>
</html>
