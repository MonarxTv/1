<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MonarxTV Premium</title>

<meta name="description" content="MonarxTV Premium – bepul va premium kontent platformasi. Kirish va xizmatlardan foydalaning.">

<!-- Favicon -->
<link rel="icon" type="image/png" href="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">

<!-- Open Graph (Google va ijtimoiy tarmoqlar uchun) -->
<meta property="og:title" content="MonarxTV Premium">
<meta property="og:description" content="MonarxTV Premium – bepul va premium kontent platformasi.">
<meta property="og:image" content="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp_400x400.png">
<meta property="og:url" content="https://saytingiz.uz">
<meta property="og:type" content="website">

<!-- Structured Data (Google uchun logo) -->
<script type="application/ld+json">
{
 "@context": "https://schema.org",
 "@type": "Organization",
 "name": "MonarxTV",
 "url": "https://saytingiz.uz",
 "logo": "https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png"
}
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<!-- PWA qo‘shimchalari -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">

<script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.min.js"></script>
</head>

<body>

<div class="container">
  <!-- LOGO -->
  <img src="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png" alt="MonarxTV Logo" class="logo">

  <p id="monarx">MonarxTv</p>
  
  <div class="button-group">
    <button id="openInChromeBtn">Bepul</button>
    <button id="premiumBtn"><i class="fas fa-crown"></i> Premium</button>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="modal-content">
    <h2>Premium Kirish</h2>
    <div class="input-group">
      <span>+998</span>
      <input type="text" id="phone" placeholder="Telefon raqam" maxlength="9">
    </div>
    <input type="password" id="password" placeholder="Parol" maxlength="5">
    <button id="loginBtn">Kirish</button>
    <div id="status"></div>
    <a href="https://t.me/MonarxTvbot" target="_blank" class="telegram-btn">
      <i class="fab fa-telegram-plane"></i> Telegram orqali to‘lov
    </a>
  </div>
</div>

<script src="script.js"></script>

<!-- Service Worker ro‘yxatdan o‘tkazish va Install banner -->
<script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  // Install bannerni keyinroq ko‘rsatish uchun saqlaymiz
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.createElement('button');
  btn.textContent = "Ilovani o‘rnatish";
  btn.id = "installBtn";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";
  btn.style.padding = "10px 20px";
  btn.style.background = "#000";
  btn.style.color = "#fff";
  btn.style.border = "none";
  btn.style.borderRadius = "5px";
  btn.style.zIndex = "9999";
  document.body.appendChild(btn);

  btn.addEventListener('click', async () => {
    btn.style.display = "none";
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  });
});

// Service Worker ro‘yxatdan o‘tkazish
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker ro‘yxatdan o‘tkazildi'))
    .catch(err => console.error('Service Worker xato:', err));
}
</script>

</body>
</html>
