<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MonarxTV Premium</title>
<meta name="description" content="MonarxTV Premium – bepul va premium kontent platformasi.">

<link rel="icon" type="image/png" href="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">

<!-- Open Graph -->
<meta property="og:title" content="MonarxTV Premium">
<meta property="og:description" content="MonarxTV Premium – bepul va premium kontent platformasi.">
<meta property="og:image" content="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">
<meta property="og:url" content="https://saytingiz.uz">
<meta property="og:type" content="website">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</head>
<body style="margin:0; padding:0; height:100vh; overflow:hidden;">

<!-- Asosiy container -->
<div class="container" id="mainContainer">
  <img src="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png" alt="MonarxTV Logo" class="logo">
  <p id="monarx">MonarxTv</p>
  <div class="button-group">
    <button id="openInChromeBtn">Bepul</button>
    <button id="premiumBtn"><i class="fas fa-crown"></i> Premium</button>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal">
  <div class="modal-content">
    <h2>Premium Kirish</h2>
    <div class="input-group">
      <span>+998</span>
      <input type="text" id="phone" placeholder="Telefon raqam" maxlength="9">
    </div>
    <input type="password" id="password" placeholder="Parol" maxlength="5">
    <button id="loginBtn">Kirish</button>
    <div id="status"></div>
    <a href="https://t.me/MonarxTvbot" target="_blank" class="telegram-btn">
      <i class="fab fa-telegram-plane"></i> Telegram orqali to‘lov
    </a>
  </div>
</div>

<!-- Iframe container -->
<div id="iframeContainer" style="display:none; width:100%; height:100vh;">
  <iframe id="siteFrame" src="" style="width:100%; height:100%; border:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script src="script.js"></script>

<script>
// Tugmalarni bosganda iframe ochish
document.getElementById("openInChromeBtn").addEventListener("click", () => {
  document.getElementById("mainContainer").style.display = "none";
  document.getElementById("iframeContainer").style.display = "block";
  document.getElementById("siteFrame").src = "https://sizning-bepul-saytingiz.uz"; // o‘zgartiring
});

document.getElementById("premiumBtn").addEventListener("click", () => {
  document.getElementById("mainContainer").style.display = "none";
  document.getElementById("iframeContainer").style.display = "block";
  document.getElementById("siteFrame").src = "https://sizning-premium-saytingiz.uz"; // o‘zgartiring
});

// PWA install tugmasi
let deferredPrompt;
const installBtn = document.createElement('button');
installBtn.textContent = "Ilovani o‘rnatish";
installBtn.id = "installBtn";
installBtn.style.position = "fixed";
installBtn.style.bottom = "20px";
installBtn.style.right = "20px";
installBtn.style.padding = "10px 20px";
installBtn.style.background = "#000";
installBtn.style.color = "#fff";
installBtn.style.border = "none";
installBtn.style.borderRadius = "5px";
installBtn.style.zIndex = "9999";
installBtn.style.display = "none";
document.body.appendChild(installBtn);

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = "block";
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  installBtn.style.display = "none";
  deferredPrompt.prompt();
  deferredPrompt = null;
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker ro‘yxatdan o‘tkazildi'))
    .catch(err => console.error('Service Worker xato:', err));
}
</script>

</body>
</html>
