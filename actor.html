<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktyor</title>

<link rel="stylesheet" href="2style.css">

<style>
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:sans-serif;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px;
  background:#020617;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* ACTOR */
.actor-info{
  display:flex;
  gap:20px;
  align-items:flex-start;
  margin-bottom:20px;
}

.actor-info img{
  width:120px;
  border-radius:12px;
  object-fit:cover;
}

.actor-name{
  font-size:22px;
  font-weight:bold;
}

.actor-bio{
  font-size:14px;
  color:#94a3b8;
  margin-top:8px;
  line-height:1.4;
}

.more{
  color:#38bdf8;
  cursor:pointer;
  font-size:13px;
}

/* MOVIES */
.section-title{
  margin:15px 0;
  font-size:18px;
  color:#94a3b8;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card div{
  padding:8px;
  font-size:14px;
}

/* STATES */
.loading{
  text-align:center;
  padding:30px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
  <div>Aktyor</div>
</div>

<div class="container">

  <div id="loading" class="loading">Yuklanmoqda...</div>

  <div id="content" style="display:none;">

    <div class="actor-info">
      <img id="actorImg">
      <div>
        <div id="actorName" class="actor-name"></div>
        <div id="actorBio" class="actor-bio"></div>
        <div id="moreBtn" class="more"></div>
      </div>
    </div>

    <div class="section-title">🎬 Filmlari</div>
    <div id="moviesGrid" class="grid"></div>

  </div>

</div>

<script src="3data.js"></script>

<script>
const TMDB_API_KEY = "c86f82502e750953b61a3fc9895c95a2";

const params = new URLSearchParams(window.location.search);
const actorId = params.get("id");

const actorImg = document.getElementById("actorImg");
const actorName = document.getElementById("actorName");
const actorBio = document.getElementById("actorBio");
const moreBtn = document.getElementById("moreBtn");
const moviesGrid = document.getElementById("moviesGrid");

const loading = document.getElementById("loading");
const content = document.getElementById("content");

let fullBio = "";

// ==================== MOVIE OPEN ====================
function openMovie(item){
  const index = moviesData.indexOf(item);
  if(index !== -1){
    window.location.href = `list.html?id=${index}`;
  }
}

// ==================== TARJIMA ====================
async function translateText(text){
  try{
    const res = await fetch(
      "https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=uz&dt=t&q=" 
      + encodeURIComponent(text)
    );
    const data = await res.json();
    return data[0].map(t => t[0]).join("");
  }catch{
    return text;
  }
}

// ==================== LOAD ACTOR ====================
async function loadActor(){
  if(!actorId) return;

  try{
    const res = await fetch(
      `https://api.themoviedb.org/3/person/${actorId}?api_key=${TMDB_API_KEY}&language=en-US`
    );

    const data = await res.json();

    actorName.textContent = data.name || "Noma'lum";

    actorImg.src = data.profile_path
      ? "https://image.tmdb.org/t/p/w300" + data.profile_path
      : "https://via.placeholder.com/120x180?text=No+Image";

    // 🔥 TARJIMA
    fullBio = await translateText(data.biography || "");

    if(fullBio.length > 200){
      actorBio.textContent = fullBio.substring(0,200) + "...";
      moreBtn.textContent = "Ko‘proq";
      moreBtn.onclick = ()=>{
        actorBio.textContent = fullBio;
        moreBtn.style.display="none";
      };
    }else{
      actorBio.textContent = fullBio || "Ma'lumot topilmadi";
    }

  }catch(e){
    console.log("Actor error:", e);
  }

  // ==================== LOCAL MOVIES ====================
  const localMovies = moviesData.filter(m =>
    m.actors?.some(a => a.tmdbId == actorId)
  );

  if(localMovies.length === 0){
    moviesGrid.innerHTML = "<p>Bu aktyor uchun film topilmadi</p>";
  } else {
    localMovies.forEach(item=>{
      const div = document.createElement("div");
      div.className="card";

      div.innerHTML = `
        <img src="${item.image}">
        <div>${item.title}</div>
      `;

      div.onclick = ()=>openMovie(item);
      moviesGrid.appendChild(div);
    });
  }

  loading.style.display="none";
  content.style.display="block";
}

// ==================== START ====================
loadActor();
</script>

</body>
</html>
