<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MonarxTv Kinolar Premyera</title>

  <meta name="description" content="MonarxTv – bepul onlayn kinolar, premyeralar va seriallar platformasi. Eng so‘nggi filmlarni tomosha qiling.">
  <meta name="keywords" content="MonarxTv, online kino, bepul kino, premyera, seriallar">
  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://kholkuziev.github.io/RTV/">
  <link rel="icon" type="image/png" href="https://pbs.twimg.com/profile_images/1131583348038623232/IOiNBicp.png">

  <!-- STYLE -->
  <link rel="stylesheet" href="3style.css">

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div id="home">

<header>
<a href="https://t.me/Monarxtv" class="premium-btn xbet-btn" target="_blank">
<span>Telegram</span>
<i class="fas fa-download"></i>
</a>

<div class="logo-container">
<div class="logo">
<i class="fas fa-crown crown-icon"></i> MonarxTv
</div>
</div>

<span id="searchBtn"><i class="fas fa-search"></i></span>
</header>

<div class="row scroll" id="shorts"></div>

<div class="row">
<h3>Premyeralar</h3>
<div class="cards" id="premieres">
<div class="cards-inner" id="premieres-inner"></div>
</div>
</div>

<div class="row genre" id="genres"></div>

<div class="row row-title">
<h3>Kinolar</h3>
<button id="allMoviesBtn" class="premium-btn">Barchasi</button>
</div>
<div class="cards" id="movies"></div>

<div class="row row-title">
<h3>Seriallar</h3>
<button id="allSeriesBtn" class="premium-btn">Barchasi</button>
</div>
<div class="cards" id="series"></div>

<div class="row row-title">
<h3>Animelar</h3>
<button id="allAnimeBtn" class="premium-btn">Barchasi</button>
</div>
<div class="cards" id="anime"></div>

</div>

<div id="movie" class="hidden">

<div class="back premium-btn" onclick="goHome()">← Orqaga</div>

<div id="playerContainer">
  <!-- Iframe va MP4 Player bir joyda -->
  <video id="player" controls width="100%" height="500">
    <source src="" type="video/mp4">
  </video>
</div>

<div id="premiumMessage" class="premium-message" style="display:none">
<h2>Premium obuna mavjud emas</h2>
<p>Bu qism premium hisoblanadi, platforma uchun 1 oylik obuna sotib oling</p>
<p>Tarif narxi: 12 000 so'm</p>
<a href="https://t.me/MonarxTvbot" target="_blank">Premium sotib olish</a>
</div>

<div class="episodes" id="episodes"></div>

<div class="info">
<h2 id="movie-title"></h2>
<p id="movie-genre"></p>
<p id="movie-desc"></p>
</div>

<div class="actors">
<h3>Aktyorlar</h3>
<div class="actor" id="movie-actors"></div>
</div>

<div class="gallery">
<h3>Kadrlar</h3>
<div class="images" id="movie-images"></div>
</div>

</div>

<div id="shortModal"></div>

<div id="listModal">
<div class="back premium-btn" onclick="closeListModal()">← Orqaga</div>
<div id="listModalContent" class="genre-cards"></div>
</div>

<div id="actorModal">
<div class="back premium-btn" onclick="closeActorModal()">← Orqaga</div>
<div id="actorHeader" class="actor-header">
<img id="actorModalImg" alt="Actor">
<h2 id="actorModalName"></h2>
</div>
<div id="actorMovies" class="genre-cards"></div>
</div>

<div id="searchModal">
<div class="back premium-btn" onclick="closeSearch()">← Orqaga</div>
<input type="text" id="searchInput" placeholder="Qidiruv...">
<div id="searchResults" class="genre-cards"></div>
</div>

<script src="3script.js"></script>

</body>
</html>
